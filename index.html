<style>
:root {
  --font-display: 'Newsreader', Georgia, serif;
  --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;

  --rule: rgba(20,24,36,0.10); --accent: #c4420f;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body { font-family: var(--font-sans); color: var(--ink); background: #1a2436; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; } input, textarea { font-family: inherit; }
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: rgba(20,24,36,0.18); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: rgba(20,24,36,0.32); background-clip: padding-box; border: 2px solid transparent; }
table { border-collapse: collapse; }
@keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeOutLogin { 0% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
@keyframes typedot   { 0%,60%,100% { opacity: .2; } 30% { opacity: 1; } }
@keyframes spin      { to { transform: rotate(360deg); } }
@keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes slideInNotif { from { opacity:0; transform:translateY(-10px) scale(.96); } to { opacity:1; transform:none; } }
@keyframes dock-bounce {
  0%,100%{transform:translateY(0) scale(1)} 20%{transform:translateY(-18px) scale(1.1)}
  40%{transform:translateY(-4px) scale(1.02)} 60%{transform:translateY(-10px) scale(1.06)}
  80%{transform:translateY(-2px) scale(1.01)}
}
.dock-bounce { animation: dock-bounce 0.9s ease 3; }
/* Placeholder adaptatif — blanc sur fonds sombres, gris sur fonds clairs */
.placeholder-light::placeholder { color: rgba(20,24,36,0.35) !important; }
.placeholder-dark::placeholder  { color: rgba(255,255,255,0.40) !important; }

/* Bannière erreur API — apparaît si /api/chat répond mal */
#lumio-api-error {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
  background: #c4420f; color: white;
  padding: 8px 20px; font-size: 12px; font-family: var(--font-mono);
  text-align: center; letter-spacing: 0.04em;
}

<div id="lumio-api-error">
  ⚠ Jefferson indisponible — Vérifiez la connexion ou contactez le support Éminéo
  <button onclick="document.getElementById('lumio-api-error').style.display='none'"
    style="margin-left:16px;background:rgba(255,255,255,0.25);border:none;color:white;padding:2px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px">✕</button>

<script>
/* ── Proxy API — toutes les requêtes Anthropic passent par /api/chat ── */
(function() {
  const _fetch = window.fetch.bind(window);
  window.fetch = function(url, opts = {}) {
    if (typeof url === 'string' && url.includes('api.anthropic.com')) {
      return _fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: opts.body,
      }).then(function(res) {
        // Afficher la bannière erreur si l'API répond mal
        if (!res.ok && res.status !== 200) {
          document.getElementById('lumio-api-error').style.display = 'block';
        }
        return res;
      }).catch(function(err) {
        document.getElementById('lumio-api-error').style.display = 'block';
        throw err;
      });
    }
    return _fetch(url, opts);
  };
})();

/* ── Export log formateur ── */
window.LUMIO_EXPORT_LOG = function() {
  const log = window.LUMIO_LOG || {};
  log.studentName  = window.LUMIO_DATA?.student?.name;
  log.exportedAt   = new Date().toISOString();
  log.elapsedMin   = window.LUMIO_TIMER_START
    ? Math.floor((Date.now() - window.LUMIO_TIMER_START) / 60000) : 0;
  const blob = new Blob([JSON.stringify(log, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lumio_log_' + (log.studentName || 'etudiant').replace(/\s+/g, '_') + '.json';
  a.click();
};
</script>
